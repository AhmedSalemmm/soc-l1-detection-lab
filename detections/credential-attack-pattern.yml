title: Failed Logon For Any Account
id: 79f9ab21-e33a-4fde-a86f-5d7981848dea
name: failed_logon_any
status: experimental
description: >
  Base rule for the spray correlation below. Password spraying inverts the
  brute-force pattern: one source, one or two password attempts each against
  many accounts, staying under per-account lockout thresholds.
references:
  - https://attack.mitre.org/techniques/T1110/003/
author: Ahmed Salem
date: 2026-06-18
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
  condition: selection
falsepositives:
  - Shared kiosk or terminal server sources naturally aggregate many users
level: low
tags:
  - attack.credential-access
  - attack.t1110.003

---
title: Possible Password Spray From Single Source
id: 726070d2-52a9-4f2a-ba57-9e75f56803fb
status: experimental
description: >
  One source address failing authentication against five or more distinct
  accounts within ten minutes. Catches low-and-slow spraying that a per-account
  threshold misses. Check whether the source legitimately serves many users
  (VPN concentrator, terminal server, proxy) before classifying.
author: Ahmed Salem
date: 2026-06-18
correlation:
  type: value_count
  rules:
    - failed_logon_any
  group-by:
    - IpAddress
  timespan: 10m
  condition:
    gte: 5
    field: TargetUserName
falsepositives:
  - NAT gateways, VPN concentrators, and jump hosts that front many real users
level: high
tags:
  - attack.credential-access
  - attack.t1110.003
